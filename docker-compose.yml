services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: onedocepares
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d onedocepares"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: rust:1.94
    working_dir: /workspace/apps/api
    command: cargo run
    environment:
      API_PORT: 8000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/onedocepares
      RUST_LOG: info,tower_http=info
      SESSION_COOKIE_NAME: odp_session
      SECURE_COOKIES: "false"
      SESSION_TTL_HOURS: "24"
      UPLOADS_DIR: ./uploads
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - cargo-target:/workspace/apps/api/target
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 5m

  web:
    image: node:24-alpine
    working_dir: /workspace/apps/web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: /api/v1
      API_TARGET: http://api:8000
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - web-node-modules:/workspace/apps/web/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
  cargo-cache:
  cargo-target:
  web-node-modules:
