<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Find upcoming events, registration windows, and tournament results." />
    <title>Tournaments | One Doce Pares</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container px-5">
        <a class="navbar-brand fw-bolder" href="/">One Doce Pares</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#mainNav" aria-controls="mainNav"
                aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="/teams.html">Teams</a></li>
            <li class="nav-item"><a class="nav-link" href="/players.html">Players</a></li>
            <li class="nav-item"><a class="nav-link active" aria-current="page" href="/tournaments.html">Tournaments</a></li>
            <li class="nav-item"><a class="nav-link" href="/leaderboard.html">Leaderboard</a></li>
          </ul>
          <a class="btn btn-outline-light ms-lg-3 mt-2 mt-lg-0" href="/login.html">Admin Login</a>
        </div>
      </div>
    </nav>

    <header class="bg-dark py-4">
      <div class="container px-5">
        <h1 class="display-6 fw-bolder text-white mb-1">Tournaments</h1>
        <p class="text-white-50 mb-0">Upcoming and past One Doce Pares events.</p>
      </div>
    </header>

    <section class="py-5">
      <div class="container px-5">
        <div class="mb-4 d-flex gap-2 flex-wrap" id="tournaments-filter" role="group" aria-label="Filter by status">
          <button class="btn btn-dark btn-sm active" data-filter="all">All</button>
          <button class="btn btn-outline-secondary btn-sm" data-filter="upcoming">Upcoming</button>
          <button class="btn btn-outline-secondary btn-sm" data-filter="active">Active</button>
          <button class="btn btn-outline-secondary btn-sm" data-filter="completed">Completed</button>
        </div>
        <div class="row g-4" id="tournaments-grid">
          <div class="col-12 text-center text-muted py-5">
            <div class="spinner-border text-primary mb-3" role="status" aria-label="Loading"></div>
            <p class="mb-0">Loading tournaments…</p>
          </div>
        </div>
        <div class="text-center mt-4 d-none" id="tournaments-pagination"></div>
      </div>
    </section>

    <footer class="py-5 bg-dark">
      <div class="container px-5">
        <p class="m-0 text-center text-white">
          Copyright &copy; One Doce Pares <span id="footer-year"></span>
        </p>
      </div>
    </footer>

    <script type="module" src="/src/tournaments.js"></script>
  </body>
</html>
