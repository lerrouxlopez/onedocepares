<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="One Doce Pares activity feed — registrations, rank changes, and tournament results." />
    <title>Activity Feed | One Doce Pares</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container px-5">
        <a class="navbar-brand fw-bolder" href="/">One Doce Pares</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#mainNav" aria-controls="mainNav"
                aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="/teams.html">Teams</a></li>
            <li class="nav-item"><a class="nav-link" href="/players.html">Players</a></li>
            <li class="nav-item"><a class="nav-link" href="/tournaments.html">Tournaments</a></li>
            <li class="nav-item"><a class="nav-link" href="/leaderboard.html">Leaderboard</a></li>
            <li class="nav-item"><a class="nav-link active" aria-current="page" href="/feed.html">Feed</a></li>
          </ul>
          <a class="btn btn-outline-light ms-lg-3 mt-2 mt-lg-0" href="/login.html">Admin Login</a>
        </div>
      </div>
    </nav>

    <header class="bg-dark py-4">
      <div class="container px-5">
        <h1 class="display-6 fw-bolder text-white mb-1">Activity Feed</h1>
        <p class="text-white-50 mb-0">Latest events across teams, players, and tournaments.</p>
      </div>
    </header>

    <section class="py-5">
      <div class="container px-5">
        <div id="feed-list">
          <div class="text-center py-5 text-muted">
            <div class="spinner-border text-primary mb-3" role="status" aria-label="Loading"></div>
            <p class="mb-0">Loading activity…</p>
          </div>
        </div>
        <div class="text-center mt-4 d-none" id="feed-load-more">
          <button class="btn btn-outline-secondary" id="btnLoadMore">
            <span class="spinner-border spinner-border-sm me-1 d-none" id="loadMoreSpinner"></span>
            Load more
          </button>
        </div>
      </div>
    </section>

    <footer class="py-5 bg-dark">
      <div class="container px-5">
        <p class="m-0 text-center text-white">
          Copyright &copy; One Doce Pares <span id="footer-year"></span>
        </p>
      </div>
    </footer>

    <script type="module" src="/src/feed.js"></script>
  </body>
</html>
